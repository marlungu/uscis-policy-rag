services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: uscis-rag-postgres
    environment:
      POSTGRES_DB: uscis_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uscis_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: uscis-rag-app
      ports:
        - "8000:8000"
      env_file:
        - .env
      environment:
        POSTGRES_URL: "postgresql+psycopg://postgres:postgres@postgres:5432/uscis_rag"
      depends_on:
        postgres:
          condition: service_healthy

volumes:
  postgres_data: